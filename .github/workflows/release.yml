name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v2026.6.23.0 or v2026.6.23.0-beta'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = '${{ github.event.inputs.tag }}'
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = '${{ github.ref_name }}'
          }
          if ($tag -notmatch '^v\d{4}\.\d+\.\d+\.\d+(-([A-Fa-f0-9]{4}|beta))?$') {
            throw "tag '$tag' does not match vYYYY.M.D.N, vYYYY.M.D.N-XXXX, or vYYYY.M.D.N-beta."
          }
          git rev-parse --verify --quiet "refs/tags/$tag^{commit}" *> $null
          if ($LASTEXITCODE -ne 0) {
            throw "tag '$tag' does not exist in the checked-out repository."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Detect beta tag
        id: beta
        shell: pwsh
        run: |
          $isBeta = '${{ steps.release_tag.outputs.tag }}' -match '^v\d{4}\.\d+\.\d+\.\d+-beta$'
          "is_beta=$($isBeta.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install lint tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery

      - name: Validate
        shell: pwsh
        run: ./scripts/lint.ps1

      - name: Build distribution
        shell: pwsh
        env:
          TAG_NAME: ${{ steps.release_tag.outputs.tag }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          ./build.ps1 -Version $version -Package

      - name: Locate release artifacts
        id: zip
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist/VRChatNetCapture-*.zip | Select-Object -First 1
          if (-not $zip) { throw "No release zip found in dist/." }
          $hash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash
          $manifest = Get-ChildItem dist/VRChatNetCapture-*.manifest.tsv | Select-Object -First 1
          if (-not $manifest) { throw "No release manifest found in dist/." }
          $integrityName = $zip.Name -replace '\.zip$', '.integrity.tsv'
          $integrity = Join-Path $zip.DirectoryName $integrityName
          $zipLine = "$hash`t$($zip.Length)`t$($zip.Name)"
          $manifestLines = Get-Content -LiteralPath $manifest.FullName -Encoding UTF8
          [System.IO.File]::WriteAllLines($integrity, [string[]](@($zipLine) + $manifestLines), [System.Text.UTF8Encoding]::new($false))
          "path=$($zip.FullName)" >> $env:GITHUB_OUTPUT
          "integrity=$integrity" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          "name=$($zip.Name)" >> $env:GITHUB_OUTPUT

      - name: Build release notes
        id: notes
        shell: pwsh
        run: |
          $tag = '${{ steps.release_tag.outputs.tag }}'
          $prev = & git describe --tags --abbrev=0 --exclude '*-*' "$tag^" 2>$null
          $range = if ($LASTEXITCODE -eq 0 -and $prev) { "$prev..$tag" } else { $tag }
          $subjects = git log --no-merges --format='- %s (%h)' $range |
            Where-Object { $_ -notmatch '\[skip changelog\]' } |
            ForEach-Object { $_ -replace ' \(\d{4}\.\d+\.\d+\.\d+(-([A-Fa-f0-9]{4}|beta))?\)', '' }
          if (-not $subjects) { $subjects = @('- Maintenance release') }
          $zipName = '${{ steps.zip.outputs.name }}'
          $zipSha = '${{ steps.zip.outputs.sha256 }}'
          $integrityName = $zipName -replace '\.zip$', '.integrity.tsv'
          $body = @(
            "## Changes",
            "",
            $subjects,
            "",
            "## Downloads",
            "",
            "- $zipName",
            "- SHA256: $zipSha",
            "- Integrity details are attached as $integrityName."
          ) -join "`n"
          $path = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          [System.IO.File]::WriteAllText($path, $body, [System.Text.UTF8Encoding]::new($false))
          "path=$path" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $extra = @()
          if ('${{ steps.beta.outputs.is_beta }}' -eq 'true') { $extra = @('--prerelease','--latest=false') }
          gh release create '${{ steps.release_tag.outputs.tag }}' '${{ steps.zip.outputs.path }}' '${{ steps.zip.outputs.integrity }}' --title '${{ steps.release_tag.outputs.tag }}' --notes-file '${{ steps.notes.outputs.path }}' @extra
