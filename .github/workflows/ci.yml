name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '!CHANGELOG.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '!CHANGELOG.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    name: lint + unittest
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Lint and test
        shell: pwsh
        run: ./scripts/lint.ps1
